syntax = "proto3";
package user.v1;

service UserService {
    rpc CreateUser(CreateUserRequest) returns(CreateUserResponse);
    rpc GetUser(GetUserRequest) returns (GetUserResponse);
}

message CreateUserRequest {
  string name = 1;
  string email = 2;
}

message CreateUserResponse {
  int32 code = 1;
  string message = 2;
  int64 user_id = 3;
  string created_at = 4;
}

message GetUserRequest {
  int64 user_id = 1;
}

message User {
  int64 id = 1;
  string name = 2;
  string email = 3;
  string created_at = 4;
}

message GetUserResponse {
  int32 code = 1;
  string message = 2;
  User user = 3;
}
